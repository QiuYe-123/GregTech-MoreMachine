jar {
    exclude "**/.cache"
    exclude "**/SimplifiedToTraditional.properties"
}

tasks.register('slimJar', Jar) {
    dependsOn("classes")
    archiveClassifier = "dev-slim"
    from sourceSets.main.output
}

obfuscation {
    reobfuscate(tasks.named('slimJar'), sourceSets.main) {
        archiveClassifier = "slim"
    }
}
// Keep the slim reobf jar as part of the assembled outputs without using the
// deprecated `archives` configuration.
tasks.named('assemble') {
    dependsOn(reobfSlimJar)
}

// Add sources jar to components.java
java {
    withSourcesJar()
}

jar.archiveClassifier = "dev"

base {
    archivesName = "${project.name}-${libs.versions.minecraft.get()}"
}

afterEvaluate {
    reobfJar.archiveClassifier = ""
    tasks.withType(org.gradle.jvm.tasks.Jar).configureEach {
        destinationDirectory = file('build/libs/')
        manifest.attributes([
                'MixinConfigs': "gtmoremachine.mixins.json",
                'Specification-Title': project.name,
                'Specification-Version': mod_version,
                'Specification-Vendor': 'QiuYe',
                'Implementation-Title': base.archivesName,
                'Implementation-Version': version,
                'Implementation-Vendor': 'QiuYe',
        ])
    }
}

spotless {
    encoding 'UTF-8'

    format 'misc', {
        target '.gitignore'

        trimTrailingWhitespace()
        leadingTabsToSpaces()
        endWithNewline()
    }
    java {
        target 'src/main/java/**/*.java', 'src/test/java/**/*.java'

        def orderFile = file("$rootDir/gradle/spotless/spotless.importorder")
        def formatFile = file("$rootDir/gradle/spotless/spotless.eclipseformat.xml")

        toggleOffOn()
        importOrderFile(orderFile)
        removeUnusedImports('cleanthat-javaparser-unnecessaryimport')
        trimTrailingWhitespace()
        leadingSpacesToTabs()
        endWithNewline()
        eclipse('4.31').configFile(formatFile)
    }
    kotlin {
        target'src/main/java/**/*.kt', 'src/test/java/**/*.kt'

        def orderFile = file("$rootDir/gradle/spotless/spotless.ktlint")
        ktlint().setEditorConfigPath(orderFile)

        toggleOffOn()
        trimTrailingWhitespace()
        leadingSpacesToTabs()
        endWithNewline()
    }
    json {
        target('src/*/resources/**/*.json', 'src/*/resources/**/*.mcmeta')
        targetExclude 'src/generated/resources/**'
        biome()
        trimTrailingWhitespace()
        leadingSpacesToTabs()
        endWithNewline()
    }
}
